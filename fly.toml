app = "sovereign-game"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/game.db"

[mounts]
  source = "game_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
